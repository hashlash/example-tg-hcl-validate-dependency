name: hcl validate
on: push
jobs:
  hcl-validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: '0.99.4'
          tofu_version: '1.11.5'

      - name: Apply dependency
        run: terragrunt --working-dir dependency-output/dependency apply -auto-approve

      - name: Check dependency output
        run: terragrunt --working-dir dependency-output/dependency output

      - name: HCL validate app
        run: terragrunt --working-dir dependency-output/app hcl validate
  
